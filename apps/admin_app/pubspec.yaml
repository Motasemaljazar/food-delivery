name: admin_app
description: Admin WebView app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.2.2
  shared_preferences: ^2.2.3
  geolocator: ^12.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  signalr_netcore: ^1.3.5
  intl: ^0.19.0
  firebase_core: ^2.32.0
  firebase_messaging: ^14.9.4
  flutter_local_notifications: ^17.2.1
  webview_flutter: ^4.8.0
  webview_flutter_android: ^4.10.0
  flutter_secure_storage: ^9.2.2
  image_picker: ^1.0.7
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/

flutter_launcher_icons:
  android: true
  image_path: "assets/images/logo-app_admin.png"
  adaptive_icon_background: "#FFD700"
  adaptive_icon_foreground: "assets/images/logo-app_admin.png"
